<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Quiz — Тренажёр английских слов</title>
<!--
═══════════════════════════════════════════════════════════════════
  ИНСТРУКЦИЯ (при добавлении нового набора слов):
  Замени ТОЛЬКО содержимое между маркерами
  "DATEN-BLOCK START" и "DATEN-BLOCK ENDE". Больше НИЧЕГО не меняй.

  Схема одной записи:
  { cat:"Школа",     // тема (любое название по-русски)
    grp:"Глаголы",   // обобщённая группа: Существительные / Глаголы /
                     //   Прилагательные / Числа / Другое
    en:"to run",     // английское слово (сущ. желательно с a/an; глагол с to)
    ru:"бежать" }    // русский перевод (варианты через запятую или /)

  Категории и группы создаются автоматически из полей cat и grp.
═══════════════════════════════════════════════════════════════════
-->
<style>
:root{
  --paper:#F6F8F6;
  --card:#FFFFFF;
  --ink:#14532D;
  --ink-soft:#5F7468;
  --line:#D9E0DA;
  --rule:#B9CFC0;
  --red:#C8372D;
  --red-soft:#FBEAE8;
  --green:#2E7D4F;
  --green-soft:#E8F4EC;
  --amber:#A8731E;
  --amber-soft:#FBF3E2;
  --blue:#1B3A6B;
  --blue-soft:#EEF2FA;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--paper);
  background-image:linear-gradient(transparent 31px, rgba(20,83,45,.05) 32px);
  background-size:100% 32px;
  color:var(--ink);
  display:flex;justify-content:center;
  padding:24px 16px 60px;
}
.app{width:100%;max-width:560px}

header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:18px}
h1{font-family:Georgia,"Iowan Old Style",serif;font-size:1.45rem;letter-spacing:.01em}
h1 .sub{display:block;font-family:system-ui,sans-serif;font-size:.8rem;font-weight:400;color:var(--ink-soft);margin-top:2px}
.set-title{font-size:.8rem;color:var(--ink-soft);text-align:right}

.screen{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:0 2px 10px rgba(20,83,45,.06);padding:26px 24px;display:none}
.screen.active{display:block}

.start h2{font-family:Georgia,serif;font-size:1.15rem;margin-bottom:6px}
.start p.meta{color:var(--ink-soft);font-size:.88rem;margin-bottom:20px}
.opt-group{margin-bottom:20px}
.opt-label{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mini-link{font-size:.78rem;color:var(--blue);background:none;border:none;cursor:pointer;text-decoration:underline;text-transform:none;letter-spacing:0}
.mode-row{display:flex;gap:10px}
.mode-btn{flex:1;padding:14px 10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;
  font-size:.95rem;font-weight:600;color:var(--ink);cursor:pointer;transition:border-color .15s, background .15s}
.mode-btn .dir{display:block;font-size:1.05rem}
.mode-btn .expl{display:block;font-size:.75rem;font-weight:400;color:var(--ink-soft);margin-top:3px}
.mode-btn.selected{border-color:var(--ink);background:#EFF6F1}

.cat-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{display:flex;align-items:center;gap:7px;padding:9px 14px;border:1.5px solid var(--line);
  border-radius:24px;background:#fff;font-size:.9rem;font-weight:600;color:var(--ink);cursor:pointer;
  user-select:none;transition:border-color .15s, background .15s}
.cat-chip .cnt{font-size:.75rem;font-weight:400;color:var(--ink-soft)}
.cat-chip.selected{border-color:var(--ink);background:#EFF6F1}
.cat-chip.selected::before{content:"\2713 ";font-weight:700}

.count-row{display:flex;gap:8px;flex-wrap:wrap}
.count-btn{padding:10px 18px;border:1.5px solid var(--line);border-radius:10px;background:#fff;
  font-size:.92rem;font-weight:600;color:var(--ink);cursor:pointer}
.count-btn.selected{border-color:var(--ink);background:#EFF6F1}
.count-input{width:80px;padding:10px;border:1.5px solid var(--line);border-radius:10px;font-size:.92rem;
  text-align:center;outline:none;color:var(--ink)}
.count-input:focus{border-color:var(--ink)}

.toggle-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.9rem;cursor:pointer;user-select:none}
.toggle-row input{width:17px;height:17px;accent-color:var(--ink)}
.start-summary{font-size:.85rem;color:var(--ink-soft);margin-top:4px;min-height:1.2em}
.big-start{width:100%;margin-top:12px;padding:15px;border:none;border-radius:10px;background:var(--ink);
  color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer}
.big-start:hover{background:#0E3D21}
.big-start:disabled{opacity:.5;cursor:default}

.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.progress-bar{flex:1;height:6px;background:#E9EFEA;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0;background:var(--ink);border-radius:3px;transition:width .3s}
.progress-num{font-size:.8rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap}
.round-badge{font-size:.7rem;font-weight:700;letter-spacing:.05em;color:var(--amber);background:var(--amber-soft);
  border-radius:20px;padding:3px 10px;display:none}
.round-badge.show{display:inline-block}
.streak{font-size:.85rem;white-space:nowrap;display:none}
.streak.show{display:inline}

.cat-tag{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.04em;color:var(--blue);
  background:var(--blue-soft);border-radius:20px;padding:3px 11px;margin-bottom:10px}
.prompt-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:6px}
.prompt-row{display:flex;align-items:center;gap:12px;margin-bottom:22px;min-height:1.2em}
.prompt-word{font-family:Georgia,serif;font-size:1.9rem;line-height:1.2}
.speak-btn{flex:none;width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);background:#fff;
  font-size:1.2rem;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--ink);transition:background .15s}
.speak-btn.show{display:inline-flex}
.speak-btn:hover{background:#EFF6F1}

.answer-zone{position:relative;margin-bottom:8px}
.answer-input{
  width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
  font-family:Georgia,serif;font-size:1.35rem;color:var(--ink);padding:6px 2px 8px;outline:none;
}
.answer-input:focus{border-bottom-color:var(--ink)}
.answer-input:disabled{color:var(--ink-soft)}
.answer-zone.wrong .answer-input{border-bottom-color:var(--red);
  text-decoration:underline wavy var(--red) 2px;text-underline-offset:6px}
.answer-zone.right .answer-input{border-bottom-color:var(--green)}

.feedback{border-radius:10px;padding:13px 15px;font-size:.92rem;line-height:1.5;margin:14px 0 4px;display:none}
.feedback.show{display:block}
.feedback.ok{background:var(--green-soft);color:var(--green)}
.feedback.err{background:var(--red-soft);color:var(--red)}
.feedback.info{background:var(--amber-soft);color:var(--amber)}
.feedback .corr{font-family:Georgia,serif;font-weight:700}

@keyframes correctPulse{
  0%  {transform:scale(1);   box-shadow:0 2px 10px rgba(20,83,45,.06)}
  30% {transform:scale(1.025);box-shadow:0 0 0 6px rgba(46,125,79,.18),0 4px 20px rgba(46,125,79,.25)}
  60% {transform:scale(1.01); box-shadow:0 0 0 3px rgba(46,125,79,.10)}
  100%{transform:scale(1);   box-shadow:0 2px 10px rgba(20,83,45,.06)}
}
@keyframes inputGlow{
  0%  {box-shadow:none}
  40% {box-shadow:0 0 0 4px rgba(46,125,79,.30)}
  100%{box-shadow:none}
}
@keyframes feedbackSlide{
  from{opacity:0;transform:translateY(-6px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes particleFly{
  0%  {opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.4)}
}
#scrQuiz.correct-flash{animation:correctPulse .55s ease-out}
.answer-zone.right .answer-input{animation:inputGlow .6s ease-out}
.feedback.show{animation:feedbackSlide .2s ease-out}
.particle{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:999;
  animation:particleFly .7s ease-out forwards}

.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.ctrl{padding:13px 10px;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;
  border:1.5px solid var(--line);background:#fff;color:var(--ink);transition:background .15s}
.ctrl:hover:not(:disabled){background:#EFF6F1}
.ctrl:disabled{opacity:.45;cursor:default}
.ctrl.primary{grid-column:1 / -1;background:var(--ink);border-color:var(--ink);color:#fff;font-size:1rem;padding:15px}
.ctrl.primary:hover:not(:disabled){background:#0E3D21}
.ctrl.next-btn{grid-column:1 / -1;background:var(--green);border-color:var(--green);color:#fff;font-size:1.05rem;
  padding:16px;font-weight:700;letter-spacing:.02em;
  box-shadow:0 4px 14px rgba(46,125,79,.35)}
.ctrl.next-btn:hover:not(:disabled){background:#256B42;box-shadow:0 6px 18px rgba(46,125,79,.45)}
@keyframes nextAppear{
  from{opacity:0;transform:translateY(8px) scale(.97)}
  to  {opacity:1;transform:translateY(0) scale(1)}
}
.ctrl.next-btn.appear{animation:nextAppear .3s cubic-bezier(.22,1,.36,1)}

.exit-link{display:block;margin:14px auto 0;background:none;border:none;color:var(--ink-soft);
  font-size:.8rem;text-decoration:underline;cursor:pointer}

.results h2{font-family:Georgia,serif;font-size:1.3rem;margin-bottom:4px}
.score-line{font-size:.95rem;color:var(--ink-soft);margin-bottom:18px}
.stat-row{display:flex;gap:10px;margin-bottom:22px}
.stat{flex:1;text-align:center;border-radius:10px;padding:12px 6px}
.stat .n{font-family:Georgia,serif;font-size:1.6rem;font-weight:700;display:block}
.stat .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.stat.g{background:var(--green-soft);color:var(--green)}
.stat.r{background:var(--red-soft);color:var(--red)}
.res-list{border-top:1px solid var(--line);max-height:300px;overflow-y:auto;margin-bottom:20px}
.res-item{display:flex;justify-content:space-between;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);font-size:.92rem;align-items:center}
.res-item .w-en{font-family:Georgia,serif;font-weight:600}
.res-item .w-ru{color:var(--ink-soft)}
.res-item .w-cat{font-size:.7rem;color:var(--blue);background:var(--blue-soft);border-radius:12px;padding:2px 8px;margin-left:6px}
.res-item .mark{font-size:1rem}
.res-actions{display:flex;flex-direction:column;gap:10px}
.res-meta{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.res-meta .row{display:flex;gap:8px;font-size:.85rem;color:var(--ink-soft);line-height:1.45}
.res-meta .row .ic{flex:none}
.res-meta .chips{display:flex;flex-wrap:wrap;gap:6px}
.res-meta .tchip{font-size:.74rem;font-weight:600;color:var(--blue);background:var(--blue-soft);border-radius:20px;padding:3px 10px}
.res-meta .time-val{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}

@media (max-width:420px){
  .screen{padding:20px 16px}
  .prompt-word{font-size:1.6rem}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Word Quiz<span class="sub">Тренажёр английских слов</span></h1>
    <div class="set-title" id="setTitle"></div>
  </header>

  <!-- ════════ СТАРТ ════════ -->
  <section class="screen start active" id="scrStart">
    <h2>Настрой свой диктант</h2>
    <p class="meta" id="metaCount"></p>

    <div class="opt-group">
      <span class="opt-label">Направление перевода</span>
      <div class="mode-row">
        <button class="mode-btn selected" id="modeRuEn">
          <span class="dir">RU → EN</span>
          <span class="expl">вижу русское — пишу английское</span>
        </button>
        <button class="mode-btn" id="modeEnRu">
          <span class="dir">EN → RU</span>
          <span class="expl">вижу английское — пишу русское</span>
        </button>
      </div>
    </div>

    <div class="opt-group">
      <span class="opt-label">Группировать по</span>
      <div class="mode-row">
        <button class="mode-btn selected" id="dimCat">
          <span class="dir">Темам</span>
          <span class="expl">еда, животные, школа…</span>
        </button>
        <button class="mode-btn" id="dimGrp">
          <span class="dir">Типу слова</span>
          <span class="expl">глаголы, прилагательные…</span>
        </button>
      </div>
    </div>

    <div class="opt-group">
      <span class="opt-label" id="catLabel">Категории слов
        <span style="display:flex;gap:14px">
          <button class="mini-link" id="btnAllCats">выбрать все</button>
          <button class="mini-link" id="btnNoneCats">убрать выделение</button>
        </span>
      </span>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <div class="opt-group">
      <span class="opt-label">Сколько слов</span>
      <div class="count-row">
        <button class="count-btn" data-n="10">10</button>
        <button class="count-btn" data-n="15">15</button>
        <button class="count-btn" data-n="20">20</button>
        <button class="count-btn selected" data-n="all">Все</button>
        <input class="count-input" id="countCustom" type="number" min="1" placeholder="своё">
      </div>
    </div>

    <div class="opt-group">
      <span class="opt-label">Настройки</span>
      <label class="toggle-row"><input type="checkbox" id="optShuffle" checked> Перемешать слова</label>
      <label class="toggle-row"><input type="checkbox" id="optRepeat" checked> Повторить ошибки в конце</label>
      <label class="toggle-row"><input type="checkbox" id="optSpeak" checked> Озвучивать английские слова 🔊</label>
      <label class="toggle-row"><input type="checkbox" id="optHard"> Сначала трудные слова</label>
    </div>

    <div class="start-summary" id="startSummary"></div>
    <button class="big-start" id="btnStart">Начать диктант</button>
  </section>

  <!-- ════════ ДИКТАНТ ════════ -->
  <section class="screen" id="scrQuiz">
    <div class="progress-wrap">
      <span class="round-badge" id="roundBadge">Работа над ошибками</span>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <span class="progress-num" id="progNum"></span>
      <span class="streak" id="streak"></span>
    </div>

    <span class="cat-tag" id="catTag"></span>
    <div class="prompt-label" id="promptLabel"></div>
    <div class="prompt-row">
      <div class="prompt-word" id="promptWord"></div>
      <button class="speak-btn" id="btnSpeak" title="Послушать">🔊</button>
    </div>

    <div class="answer-zone" id="answerZone">
      <input class="answer-input" id="answerInput" type="text" autocomplete="off"
             autocapitalize="off" spellcheck="false" placeholder="напиши здесь…">
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
      <button class="ctrl" id="btnDontKnow">Не знаю</button>
      <button class="ctrl" id="btnBack">← Назад</button>
      <button class="ctrl primary" id="btnCheck">Проверить ответ</button>
      <button class="ctrl next-btn" id="btnSkipNext" style="display:none">Дальше →</button>
    </div>
    <button class="exit-link" id="btnExit">⟵ выйти к настройкам</button>
  </section>

  <!-- ════════ РЕЗУЛЬТАТЫ ════════ -->
  <section class="screen results" id="scrResults">
    <h2 id="resHead">Диктант окончен!</h2>
    <p class="score-line" id="resScore"></p>
    <div class="stat-row">
      <div class="stat g"><span class="n" id="stOk">0</span><span class="l">верно</span></div>
      <div class="stat r"><span class="n" id="stFail">0</span><span class="l">с ошибкой</span></div>
    </div>
    <div class="res-meta" id="resMeta"></div>
    <div class="res-list" id="resList"></div>
    <div class="res-actions">
      <button class="ctrl primary" id="btnAgainSetup">Новый диктант (настройки)</button>
      <button class="ctrl" id="btnAgainErrors" style="display:none">Повторить только ошибки</button>
    </div>
  </section>
</div>

<script>
/* ═══════════════════ DATEN-BLOCK START ═══════════════════ */
const SET_TITLE = "Starter Book — словарь, 6 класс";
const VOCAB = [
  {cat:"Alphabet words", grp:"Существительные", en:"ant", ru:"муравей"},
  {cat:"Alphabet words", grp:"Существительные", en:"bee", ru:"пчела"},

  {cat:"Numbers", grp:"Числа", en:"twelve", ru:"двенадцать"},
  {cat:"Numbers", grp:"Числа", en:"thirteen", ru:"тринадцать"},
  {cat:"Numbers", grp:"Числа", en:"fourteen", ru:"четырнадцать"},

  {cat:"Numbers", grp:"Числа", en:"sixty", ru:"шестьдесят"},
  {cat:"Numbers", grp:"Числа", en:"seventy", ru:"семьдесят"},

/* ---------- конфетти-частицы ---------- */
const COLORS=["#2E7D4F","#4CAF82","#A8D5B5","#1B3A6B","#F5C842","#E8645A"];
function burstParticles(x,y){
  for(let i=0;i<18;i++){
    const p=document.createElement("div");
    p.className="particle";
    const angle=Math.random()*360, dist=50+Math.random()*80;
    const tx=Math.cos(angle*Math.PI/180)*dist+"px";
    const ty=Math.sin(angle*Math.PI/180)*dist-30+"px";
    p.style.cssText=`left:${x}px;top:${y}px;background:${COLORS[i%COLORS.length]};`+
      `--tx:${tx};--ty:${ty};animation-delay:${Math.random()*80}ms`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

/* ---------- озвучивание (Web Speech API) ---------- */
let VOICES=[];
function loadVoices(){ try{VOICES=speechSynthesis.getVoices();}catch(e){} }
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text){
  if(!$("optSpeak").checked || !("speechSynthesis" in window)) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.85;
    const v=VOICES.find(v=>/en[-_]/i.test(v.lang)); if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- статистика по словам (localStorage) ---------- */
const STATS_KEY="wq_stats_v1";
function loadStats(){ try{return JSON.parse(localStorage.getItem(STATS_KEY))||{};}catch(e){return {};} }
function saveStats(){ try{localStorage.setItem(STATS_KEY,JSON.stringify(STATS));}catch(e){} }
let STATS=loadStats();
function recordStat(en, ok){
  const s=STATS[en]||{seen:0,wrong:0};
  s.seen++; if(!ok) s.wrong++;
  STATS[en]=s; saveStats();
}
function hardScore(w){            // больше = труднее (изучать раньше)
  const s=STATS[w.en];
  if(!s||s.seen===0) return 0.45; // новые слова — средний приоритет
  return s.wrong/s.seen;
}
function learnedCount(){
  return VOCAB.filter(w=>{const s=STATS[w.en];return s&&s.seen>=2&&s.wrong/s.seen<0.34;}).length;
}

  const m = Math.floor(s/60), sec = s%60;
  return m>0 ? m+" мин "+sec+" сек" : sec+" сек";
}

const PRAISE = ["Отлично, верно!","Точно в цель!","Super! Верно!","Молодец!","Именно так!","Great job!"];
const $ = id => document.getElementById(id);
const screens = { start:$("scrStart"), quiz:$("scrQuiz"), res:$("scrResults") };
function show(name){
  Object.values(screens).forEach(s=>s.classList.remove("active"));
  screens[name].classList.add("active");
}

/* ---------- нормализация и проверка ---------- */
function norm(s){
  return s.trim().toLowerCase()
          .replace(/\s+/g," ")
          .replace(/ё/g,"е")
          .replace(/[’`]/g,"'");
}
const EN_PREFIX = /^(a|an|the|to)\s+/;
function coreEn(s){ return norm(s).replace(EN_PREFIX,""); }

function checkAnswer(user, target, isEnglish){
  const variants = target.split(/[,;\/]/).map(v=>v.trim()).filter(Boolean);
  if (!isEnglish){
    return variants.map(norm).includes(norm(user)) ? "ok" : "wrong";
  }
  const u = norm(user);
  for (const v of variants){
    const t = norm(v);
    if (u === t) return "ok";
    const tCore = coreEn(v), uCore = coreEn(user);
    if (uCore === tCore){
      const tHasPrefix = EN_PREFIX.test(t), uHasPrefix = EN_PREFIX.test(u);
      if (tHasPrefix && !uHasPrefix) return "prefix";
      if (tHasPrefix && uHasPrefix) return "prefix-wrong";
      if (!tHasPrefix && uHasPrefix) return "prefix-extra";
    }
  }
  return "wrong";
}

/* ---------- измерение группировки ---------- */
function dimValues(){
  if (dim==="grp") return GRP_ORDER.filter(g=>VOCAB.some(w=>w.grp===g));
  return [...new Set(VOCAB.map(w=>w.cat))];
}

/* ---------- построение стартового экрана ---------- */
function buildCats(){
  const grid = $("catGrid");
  grid.innerHTML = "";
  selected = new Set();
  dimValues().forEach(c=>{
    const n = VOCAB.filter(w=>w[dim]===c).length;
    const chip = document.createElement("button");
    chip.className = "cat-chip selected";
    chip.innerHTML = c+" <span class='cnt'>"+n+"</span>";
    chip.onclick = ()=>{
      chip.classList.toggle("selected");
      chip.classList.contains("selected") ? selected.add(c) : selected.delete(c);
      updateSummary();
    };
    grid.appendChild(chip);
    selected.add(c);
  });
  updateSummary();
}
function setDim(d){
  dim = d;
  $("dimCat").classList.toggle("selected", d==="cat");
  $("dimGrp").classList.toggle("selected", d==="grp");
  $("catLabel").childNodes[0].nodeValue = (d==="cat" ? "Категории слов " : "Группы слов ");
  buildCats();
}
$("dimCat").onclick = ()=>setDim("cat");
$("dimGrp").onclick = ()=>setDim("grp");

$("btnAllCats").onclick = ()=>{
  document.querySelectorAll(".cat-chip").forEach(ch=>ch.classList.add("selected"));
  dimValues().forEach(c=>selected.add(c));
  updateSummary();
};
$("btnNoneCats").onclick = ()=>{
  document.querySelectorAll(".cat-chip").forEach(ch=>ch.classList.remove("selected"));
  selected.clear();
  updateSummary();
};
document.querySelectorAll(".count-btn").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll(".count-btn").forEach(x=>x.classList.remove("selected"));
    b.classList.add("selected");
    countChoice = b.dataset.n;
    $("countCustom").value = "";
    updateSummary();
  };
});
$("countCustom").addEventListener("input", ()=>{
  document.querySelectorAll(".count-btn").forEach(x=>x.classList.remove("selected"));
  countChoice = "custom";
  updateSummary();
});
function poolWords(){
  return VOCAB.map((w,i)=>({w,i})).filter(o=>selected.has(o.w[dim]));
}
function plannedCount(){
  const pool = poolWords().length;
  if (countChoice==="all") return pool;
  if (countChoice==="custom"){
    const v = parseInt($("countCustom").value);
    return isNaN(v)||v<1 ? pool : Math.min(v, pool);
  }
  return Math.min(parseInt(countChoice), pool);
}
function updateSummary(){
  const pool = poolWords().length;
  const n = plannedCount();
  $("btnStart").disabled = pool===0;
  const word = dim==="cat" ? "тем" : "групп";
  $("startSummary").textContent = pool===0
    ? "Выбери хотя бы одну группу."
    : "Будет "+n+" слов · выбрано "+selected.size+" "+word+".";
}

$("modeRuEn").onclick = ()=>{ mode="ruen"; $("modeRuEn").classList.add("selected"); $("modeEnRu").classList.remove("selected"); };
$("modeEnRu").onclick = ()=>{ mode="enru"; $("modeEnRu").classList.add("selected"); $("modeRuEn").classList.remove("selected"); };

$("btnStart").onclick = ()=>{
  let pool = poolWords().map(o=>o.i);
  if ($("optShuffle").checked) pool.sort(()=>Math.random()-0.5);
  if ($("optHard").checked) pool.sort((a,b)=>hardScore(VOCAB[b])-hardScore(VOCAB[a]));
  runStartMs = Date.now();
  startRun(pool.slice(0, plannedCount()), false);
};

function startRun(indices, isErrorRound){
  order = [...indices];
  if (isErrorRound && $("optShuffle").checked) order.sort(()=>Math.random()-0.5);
  pos = 0; streakCount = 0;
  errorRound = isErrorRound;
  order.forEach(i=>{ delete results[i]; delete attempts[i]; delete answered[i]; });
  $("roundBadge").classList.toggle("show", isErrorRound);
  $("streak").classList.remove("show");
  show("quiz");
  renderCard();
}

/* ---------- карточка ---------- */
function targetOf(w){ return mode==="ruen" ? w.en : w.ru.split(/[,;\/]/)[0].trim(); }

function renderCard(){
  const idx = order[pos];
  const w = VOCAB[idx];
  const askRu = mode==="ruen";
  $("catTag").textContent = dim==="grp" ? w.grp : w.cat;
  $("promptLabel").textContent = askRu ? "Переведи на английский:" : "Переведи на русский:";
  $("promptWord").textContent  = askRu ? w.ru.split(/[,;\/]/)[0] : w.en;
  $("progNum").textContent = (pos+1)+" / "+order.length;
  $("progFill").style.width = (pos/order.length*100)+"%";

  const fb = $("feedback");
  fb.className = "feedback"; fb.innerHTML = "";
  const input = $("answerInput");
  input.value = ""; input.disabled = false;
  $("answerZone").className = "answer-zone";

  $("btnCheck").style.display = "";
  $("btnSkipNext").style.display = "none";
  $("btnDontKnow").disabled = false;
  $("btnBack").disabled = pos===0;

  // кнопка «послушать»: в EN→RU слово видно сразу, можно слушать; в RU→EN — после ответа
  updateSpeakBtn(false);
  if (!askRu) speak(w.en);

  if (answered[idx]) showFinalState(idx);
  input.focus();
}

function updateSpeakBtn(revealed){
  const w = VOCAB[order[pos]];
  const btn = $("btnSpeak");
  const canSpeak = (mode==="enru") || revealed;   // не подсказываем ответ в RU→EN
  btn.classList.toggle("show", canSpeak);
  btn.onclick = ()=>{ const opt=$("optSpeak"); if(!opt.checked) opt.checked=true; speak(w.en); };
}

function showFinalState(idx){
  const w = VOCAB[idx];
  const fb = $("feedback");
  const input = $("answerInput");
  input.disabled = true;
  input.value = targetOf(w);
  if (results[idx]==="fail"){
    $("answerZone").classList.add("wrong");
    fb.className = "feedback show err";
    fb.innerHTML = "Правильный ответ: <span class='corr'>"+w.en+" — "+w.ru+"</span>";
  } else {
    $("answerZone").classList.add("right");
    fb.className = "feedback show ok";
    fb.innerHTML = "Верно!";
  }
  $("btnCheck").style.display = "none";
  const nxt2 = $("btnSkipNext");
  nxt2.style.display = "";
  nxt2.className = "ctrl next-btn";
  nxt2.textContent = pos < order.length-1 ? "Дальше →" : "Завершить ✓";
  $("btnDontKnow").disabled = true;
  updateSpeakBtn(true);
}

$("btnDontKnow").onclick = ()=>{
  const idx = order[pos];
  if (answered[idx]) return;
  streakCount = 0; updateStreak();
  failWord(idx, "Запомни: ");
};

$("btnBack").onclick = ()=>{ if (pos>0){ pos--; renderCard(); } };
$("btnSkipNext").onclick = nextCard;
$("btnExit").onclick = ()=>{ if (confirm("Выйти? Прогресс этого диктанта пропадёт.")) show("start"); };

$("btnCheck").onclick = ()=>{
  const idx = order[pos];
  if (answered[idx]) { nextCard(); return; }
  const w = VOCAB[idx];
  const user = $("answerInput").value;
  if (!user.trim()) { $("answerInput").focus(); return; }
  const target = mode==="ruen" ? w.en : w.ru;
  const res = checkAnswer(user, target, mode==="ruen");
  const fb = $("feedback");

  if (res==="ok"){
    results[idx] = "ok";
    answered[idx] = true;
    if(!errorRound) recordStat(w.en, true);
    streakCount++; updateStreak();
    $("answerZone").className = "answer-zone right";
    fb.className = "feedback show ok";
    fb.innerHTML = PRAISE[Math.floor(Math.random()*PRAISE.length)];
    $("answerInput").disabled = true;
    speak(w.en);
    updateSpeakBtn(true);
    $("btnCheck").style.display = "none";
    const nxt = $("btnSkipNext");
    nxt.style.display = "";
    nxt.className = "ctrl next-btn appear";
    nxt.textContent = pos < order.length-1 ? "Дальше →" : "Завершить ✓";
    nxt.focus();
    const quiz = $("scrQuiz");
    quiz.classList.remove("correct-flash");
    void quiz.offsetWidth;
    quiz.classList.add("correct-flash");
    const r = $("answerInput").getBoundingClientRect();
    burstParticles(r.left + r.width/2, r.top + r.height/2);
    return;
  }
  if (res==="prefix" || res==="prefix-wrong" || res==="prefix-extra"){
    fb.className = "feedback show info";
    fb.innerHTML = res==="prefix"
      ? "Слово верное! Но впереди кое-чего не хватает (a / an / to). Допиши."
      : res==="prefix-wrong"
      ? "Слово верное, но артикль не тот. Подумай: a или an?"
      : "Слово верное, но здесь артикль не нужен — убери его.";
    attempts[idx] = (attempts[idx]||0) + 0.5;
    if (attempts[idx] >= 1.5){ streakCount=0; updateStreak(); failWord(idx, "Правильный ответ: "); }
    return;
  }
  attempts[idx] = (attempts[idx]||0) + 1;
  streakCount = 0; updateStreak();
  if (attempts[idx] < 2){
    $("answerZone").className = "answer-zone wrong";
    fb.className = "feedback show err";
    fb.innerHTML = "Пока не так. Попробуй ещё раз.";
  } else {
    failWord(idx, "Правильный ответ: ");
  }
};

function failWord(idx, prefixText){
  const w = VOCAB[idx];
  results[idx] = "fail";
  answered[idx] = true;
  if(!errorRound) recordStat(w.en, false);
  $("answerInput").value = targetOf(w);
  $("answerInput").disabled = true;
  $("answerZone").className = "answer-zone wrong";
  const fb = $("feedback");
  fb.className = "feedback show err";
  fb.innerHTML = prefixText+"<span class='corr'>"+w.en+" — "+w.ru+"</span>";
  speak(w.en);
  updateSpeakBtn(true);
  $("btnCheck").style.display = "none";
  const nxt3 = $("btnSkipNext");
  nxt3.style.display = "";
  nxt3.className = "ctrl next-btn";
  nxt3.textContent = pos < order.length-1 ? "Дальше →" : "Завершить ✓";
  $("btnDontKnow").disabled = true;
}

function updateStreak(){
  const el = $("streak");
  if (streakCount>=3){ el.textContent = "🔥 "+streakCount; el.classList.add("show"); }
  else el.classList.remove("show");
}

function nextCard(){
  if (pos < order.length-1){ pos++; renderCard(); }
  else finishRun();
}

$("answerInput").addEventListener("keydown", e=>{
  if (e.key==="Enter"){
    if ($("btnCheck").style.display!=="none") $("btnCheck").click();
    else $("btnSkipNext").click();
  }
});
document.addEventListener("keydown", e=>{
  if (e.key==="Enter" && screens.quiz.classList.contains("active")
      && $("btnSkipNext").style.display!=="none"
      && document.activeElement!==$("answerInput")) $("btnSkipNext").click();
});

/* ---------- результаты ---------- */
function finishRun(){
  $("progFill").style.width = "100%";
  const fails = order.filter(i=>results[i]==="fail");

  if (!errorRound && fails.length && $("optRepeat").checked){
    firstRoundResults = {...results};
    startRun(fails, true);
    return;
  }

  const base = firstRoundResults || results;
  const all = Object.keys(base).map(Number);
  const ok   = all.filter(i=>base[i]==="ok").length;
  const fail = all.filter(i=>base[i]==="fail").length;
  $("stOk").textContent = ok;
  $("stFail").textContent = fail;

  const pct = Math.round(ok/all.length*100);
  $("resHead").textContent = pct===100 ? "Идеально! 🎉" : pct>=70 ? "Хороший результат! 👍" : "Есть над чем поработать 💪";
  $("resScore").textContent = "Результат: "+pct+"%"+(errorRound ? " · ошибки отработаны повторно" : "");

  const list = $("resList");
  list.innerHTML = "";
  all.forEach(i=>{
    const w = VOCAB[i];
    const m = base[i]==="ok" ? "✅" : "❌";
    const tag = dim==="grp" ? w.grp : w.cat;
    const div = document.createElement("div");
    div.className = "res-item";
    div.innerHTML = "<span><span class='w-en'>"+w.en+"</span> — <span class='w-ru'>"+w.ru.split(/[,;]/)[0]+"</span><span class='w-cat'>"+tag+"</span></span><span class='mark'>"+m+"</span>";
    list.appendChild(div);
  });

  // выбранные темы/группы и затраченное время
  const elapsed = runStartMs ? Date.now()-runStartMs : 0;
  const themes = [...new Set(all.map(i=>VOCAB[i][dim]))];
  const chips = themes.map(t=>"<span class='tchip'>"+t+"</span>").join("");
  $("resMeta").innerHTML =
    "<div class='row'><span class='ic'>📚</span><div><div>"+(dim==="grp"?"Группы слов":"Темы слов")
      +":</div><div class='chips' style='margin-top:5px'>"+chips+"</div></div></div>"
    +"<div class='row'><span class='ic'>⏱️</span><div><b>Время:</b> <span class='time-val'>"
      +fmtTime(elapsed)+"</span> · слов: "+all.length+"</div></div>";

  $("btnAgainErrors").style.display = fail>0 ? "" : "none";
  window._lastErrors = all.filter(i=>base[i]==="fail");
  firstRoundResults = null;
  $("metaCount").textContent = "В наборе: "+VOCAB.length+" слов · выучено: "+learnedCount();
  show("res");
}

$("btnAgainSetup").onclick = ()=>{ updateSummary(); show("start"); };
$("btnAgainErrors").onclick = ()=>{
  const bad = window._lastErrors || [];
  if (bad.length){ runStartMs = Date.now(); startRun(bad, true); }
};

/* ---------- инициализация ---------- */
$("setTitle").textContent = SET_TITLE;
$("metaCount").textContent = "В наборе: "+VOCAB.length+" слов · выучено: "+learnedCount();
setDim("cat");
</script>
</body>
</html>
